<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academic Repository — Login</title>
  <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="nav-brand">
      <a href="index.html" style="display:flex;align-items:center;gap:.5rem;text-decoration:none;color:inherit;">
        <i class="fas fa-graduation-cap"></i>
        <span>AcadRepo</span>
      </a>
    </div>
  </nav>

  <!-- ===== HERO with particles ===== -->
  <header class="hero hero-enhanced" style="padding:3rem 2rem 2rem;">
    <div class="hero-particles" id="heroParticles"></div>
    <div class="enh-floating-icons">
      <i class="fas fa-lock enh-float-icon"></i>
      <i class="fas fa-user-shield enh-float-icon"></i>
      <i class="fas fa-key enh-float-icon"></i>
      <i class="fas fa-shield-halved enh-float-icon"></i>
    </div>
    <div class="hero-content" style="text-align:center;">
      <div class="hero-badge"><i class="fas fa-shield-halved"></i> Secure Access</div>
      <h1 class="enh-page-title">Academic Repository</h1>
      <p>Plagiarism Detection Using TF-IDF and Cosine Similarity</p>
    </div>
  </header>

  <!-- ===== AUTH CARD ===== -->
  <main class="container" style="max-width:480px;">
    <section class="card enh-card-animate" id="authCard">
      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" data-tab="login">
          <i class="fas fa-right-to-bracket"></i> Login
        </button>
        <button class="auth-tab" id="tabRegister" data-tab="register">
          <i class="fas fa-user-plus"></i> Register
        </button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
          <div class="password-wrap">
            <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password" />
            <button type="button" class="btn-icon toggle-pw" data-target="loginPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div id="loginError" class="auth-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block btn-glow" id="btnLogin">
          <i class="fas fa-right-to-bracket"></i> Sign In
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="auth-form hidden">
        <div class="form-group">
          <label for="regName"><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="regName" placeholder="Enter your full name" required />
        </div>
        <div class="form-group">
          <label for="regEmail"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="regEmail" placeholder="Enter your email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="regPassword"><i class="fas fa-lock"></i> Password</label>
          <div class="password-wrap">
            <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
            <button type="button" class="btn-icon toggle-pw" data-target="regPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="regConfirm"><i class="fas fa-lock"></i> Confirm Password</label>
          <div class="password-wrap">
            <input type="password" id="regConfirm" placeholder="Confirm password" required autocomplete="new-password" />
            <button type="button" class="btn-icon toggle-pw" data-target="regConfirm">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div id="registerError" class="auth-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block btn-glow" id="btnRegister">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2025 AcadRepo — Web-Based Academic Repository with TF-IDF &amp; Cosine Similarity Plagiarism Detection</p>
  </footer>

  <script src="js/auth.js"></script>
  <script>
    (function(){
      const c=document.getElementById('heroParticles');if(!c)return;
      for(let i=0;i<20;i++){const p=document.createElement('div');p.className='hero-particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(6+Math.random()*8)+'s';p.style.animationDelay=(Math.random()*6)+'s';p.style.width=p.style.height=(2+Math.random()*3)+'px';c.appendChild(p);}
    })();
  </script>
</body>
</html>
